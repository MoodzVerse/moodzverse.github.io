<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moodz Lounge</title>

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:#05051a;
  font-family:"Courier New",monospace;
}

/* HOME SCREEN */
.home{
  position:relative;
  width:100%;
  max-width:430px;
  margin:0 auto;
  aspect-ratio:1024/1216;
  background:url("moodz-home.png") center/cover no-repeat;
  overflow:hidden;
}

/* TWINKLING STARS */
.twinkle{
  position:absolute;
  color:#fff7a8;
  font-size:14px;
  text-shadow:0 0 8px #fff;
  animation:twinkle 1.5s infinite alternate;
  pointer-events:none;
}
@keyframes twinkle{
  from{opacity:.25;transform:scale(.7)}
  to{opacity:1;transform:scale(1.3)}
}

/* WATERFALL POUR */
.water{
  position:absolute;
  right:8.4%;
  top:44.7%;
  width:10.4%;
  height:14.5%;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.95) 0px,
    rgba(120,235,255,.9) 7px,
    rgba(15,130,230,.85) 14px
  );
  opacity:.45;
  mix-blend-mode:screen;
  animation:pour .35s linear infinite;
  clip-path:polygon(15% 0,100% 0,86% 100%,0 100%);
  pointer-events:none;
}
@keyframes pour{
  to{background-position-y:28px}
}

/* FLOATING STAR AREA */
.star-glow{
  position:absolute;
  left:40%;
  top:45%;
  width:20%;
  height:15%;
  border-radius:50%;
  animation:floaty 2.2s ease-in-out infinite;
  pointer-events:none;
}
@keyframes floaty{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

/* RANDOM SPEECH BUBBLE TEXT */
.bubble-text{
  position:absolute;
  left:34%;
  top:33.4%;
  width:32%;
  color:#111;
  font-weight:bold;
  font-size:13px;
  line-height:1.4;
  text-align:left;
}

/* RANDOM WOOD SIGN TEXT */
.sign-text{
  position:absolute;
  left:8%;
  top:50.6%;
  width:21%;
  color:#26150b;
  font-weight:bold;
  font-size:12px;
  line-height:1.28;
  text-align:center;
}

/* RANDOM XP */
.xp-text{
  position:absolute;
  left:45%;
  bottom:4.7%;
  color:#fff;
  font-weight:bold;
  font-size:15px;
  text-shadow:2px 2px #000;
}

/* CLICKABLE MENU AREAS */
.hotspot{
  position:absolute;
  display:block;
  border-radius:8px;
}
.hotspot:active{
  background:rgba(255,255,255,.15);
}
.start{left:14%;top:68%;width:35%;height:6%}
.journal{left:52%;top:68%;width:35%;height:6%}
.daily{left:14%;top:75%;width:35%;height:6%}
.music{left:52%;top:75%;width:35%;height:6%}
.breathe{left:14%;top:82%;width:35%;height:6%}
.surprise{left:52%;top:82%;width:35%;height:6%}

/* SECTIONS */
.section{
  min-height:100vh;
  background:#090934;
  color:#fff4d8;
  padding:42px 20px;
  text-align:center;
}
.card{
  background:#fff0d4;
  color:#1b1238;
  border:4px solid #ff8ccf;
  padding:24px;
  box-shadow:6px 6px #000;
  font-weight:bold;
  max-width:420px;
  margin:auto;
}
button,.link-btn{
  display:block;
  width:100%;
  margin-top:14px;
  padding:14px;
  font-family:"Courier New",monospace;
  font-weight:bold;
  background:#ff9bd2;
  color:#1b1238;
  border:4px solid #fff0d4;
  box-shadow:4px 4px #000;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="home">
  <div id="twinkleLayer"></div>
  <div class="water"></div>
  <div class="star-glow"></div>

  <div class="bubble-text" id="bubbleText"></div>
  <div class="sign-text" id="signText"></div>
  <div class="xp-text" id="xpText"></div>

  <a class="hotspot start" href="#start"></a>
  <a class="hotspot journal" href="#journal"></a>
  <a class="hotspot daily" href="#daily"></a>
  <a class="hotspot music" href="#music"></a>
  <a class="hotspot breathe" href="#breathe"></a>
  <a class="hotspot surprise" href="#surprise"></a>
</div>

<section id="start" class="section">
  <div class="card" id="startCard"></div>
</section>

<section id="daily" class="section">
  <div class="card">
    <h2>💗 Daily Boost</h2>
    <p id="quote"></p>
    <button onclick="newQuote()">New Boost ✨</button>
  </div>
</section>

<section id="breathe" class="section">
  <div class="card">
    <h2>🌿 Breathe</h2>
    <p>Inhale for 4<br>Hold for 4<br>Exhale for 6</p>
    <p>You are safe to slow down.</p>
  </div>
</section>

<section id="journal" class="section">
  <div class="card">
    <h2>📖 Journal</h2>
    <p id="prompt"></p>
    <button onclick="newPrompt()">New Prompt 🎲</button>
  </div>
</section>

<section id="music" class="section">
  <div class="card">
    <h2>🎵 Music</h2>
    <p>Pick your vibe.</p>
    <a class="link-btn" href="https://www.youtube.com/results?search_query=lofi+relaxing+music" target="_blank">🌙 Lofi Nights</a>
    <a class="link-btn" href="https://www.youtube.com/results?search_query=rain+sounds+relaxing" target="_blank">☔ Rain Sounds</a>
  </div>
</section>

<section id="surprise" class="section">
  <div class="card">
    <h2>🎁 Surprise Me</h2>
    <p id="gift"></p>
    <button onclick="newGift()">Open Gift 🎁</button>
  </div>
</section>

<script>
const bubbleMessages = [
  "Hey friend!<br>I’m Star ✨<br>I’m glad you’re here.",
  "Welcome back!<br>Star saved a soft<br>message for you.",
  "You made it here 💗<br>That counts as<br>progress.",
  "Hi Traveler ⭐<br>Take what you<br>need today.",
  "Star says:<br>You don’t have to<br>rush healing.",
  "Hey you ✨<br>Your soft era<br>still counts."
];

const signMessages = [
  "YOU MATTER<br>YOU ARE LOVED<br>YOU ARE ENOUGH",
  "REST COUNTS<br>TRY AGAIN<br>TOMORROW",
  "SMALL STEPS<br>STILL COUNT<br>♡",
  "YOU ARE SAFE<br>TO BREATHE<br>HERE",
  "KEEP GOING<br>SOFTLY<br>♡"
];

const quotes = [
  "You are doing better than you think.",
  "Rest is part of the quest.",
  "Small progress still counts.",
  "You can begin again.",
  "You are allowed to move slowly.",
  "Your healing does not have to be pretty to be real.",
  "One soft step is still a step."
];

const prompts = [
  "What do I need today?",
  "What can I release?",
  "What am I proud of?",
  "What would I tell a friend right now?",
  "What would make today feel softer?",
  "Where do I need more patience with myself?"
];

const gifts = [
  "You found +5 Hope.",
  "Rare item: peace.",
  "Inventory added: courage.",
  "Achievement unlocked: you kept going.",
  "Star is proud of you.",
  "You found a soft place to land.",
  "New skill unlocked: trying again."
];

const starts = [
  "⭐ Welcome, Traveler. This is your save point.",
  "🌙 You entered Moodz Lounge. Stay as long as you need.",
  "💗 Star saved your progress today.",
  "🎮 New Quest: Be gentle with yourself.",
  "✨ Today’s mission: take one small step."
];

function pick(list){
  return list[Math.floor(Math.random() * list.length)];
}

function loadRandomPage(){
  bubbleText.innerHTML = pick(bubbleMessages);
  signText.innerHTML = pick(signMessages);
  quote.innerText = pick(quotes);
  prompt.innerText = pick(prompts);
  gift.innerText = pick(gifts);
  startCard.innerText = pick(starts);

  const xp = Math.floor(Math.random() * 70) + 10;
  xpText.innerText = `${xp} / 100 XP`;

  for(let i = 0; i < 35; i++){
    const star = document.createElement("div");
    star.className = "twinkle";
    star.innerText = Math.random() > .5 ? "✦" : "✧";
    star.style.left = Math.random() * 95 + "%";
    star.style.top = Math.random() * 30 + "%";
    star.style.animationDelay = Math.random() * 2 + "s";
    star.style.animationDuration = (1 + Math.random() * 1.6) + "s";
    twinkleLayer.appendChild(star);
  }
}

function newQuote(){
  quote.innerText = pick(quotes);
}

function newPrompt(){
  prompt.innerText = pick(prompts);
}

function newGift(){
  gift.innerText = pick(gifts);
}

loadRandomPage();
</script>

</body>
</html>
