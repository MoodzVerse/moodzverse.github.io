  <title>Moodz Lounge</title>
  <link rel="stylesheet" href="css/style.css" />

<body>
  <main class="game-screen">

    <div class="sky">
      <div class="moon"></div>
      <div class="stars"></div>
    </div>

    <section class="title-area">
      <h1>MOODZ<br><span>LOUNGE</span></h1>
      <p>Take What You Need Today</p>
    </section>

    <section class="starry-section">
      <div class="speech-bubble">

      </div>

      <div class="starry">
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="cheek left-cheek"></div>
        <div class="cheek right-cheek"></div>
        <div class="mouth"></div>
      </div>
    </section>

    <nav class="menu hidden" id="menu">
