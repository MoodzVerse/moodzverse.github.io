<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moodz Lounge</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #05051a;
}

.game-screen {
  width: 100vw;
  height: 100vh;
  background-image: url("moodz-home.png");
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
}

.star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #fff7a8;
  box-shadow:
    0 -6px #fff7a8,
    0 6px #fff7a8,
    -6px 0 #fff7a8,
    6px 0 #fff7a8;
  animation: twinkle 1.5s infinite steps(2);
}

@keyframes twinkle {
  0%, 100% { opacity: .2; transform: scale(.7); }
  50% { opacity: 1; transform: scale(1.3); }
}
</style>
</head>
<body>

<div class="game-screen" id="screen"></div>

<script>
const screen = document.getElementById("screen");

for (let i = 0; i < 20; i++) {
  const star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * 95 + "%";
  star.style.top = Math.random() * 35 + "%";
  star.style.animationDelay = Math.random() * 2 + "s";
  screen.appendChild(star);
}
</script>

</body>
</html>
