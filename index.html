<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodz Lounge</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Animated Sky -->
<div id="sky">

    <div id="moon"></div>

    <div id="stars"></div>

    <div id="clouds"></div>

    <div id="city"></div>

</div>

<!-- Main Window -->

<div id="window">

    <header>

        <h1>
            MOODZ
            <span>LOUNGE</span>
        </h1>

        <p>
            Take What You Need Today
        </p>

    </header>


    <!-- Starry -->

    <section id="starry-area">

        <div id="speech">

            <p id="typing"></p>

        </div>

        <div id="starry">

            <!-- Sprite goes here later -->

            <div id="placeholder">

                ⭐

            </div>

        </div>

    </section>


    <!-- Menu -->

    <nav id="menu">

        <button>
            🎮 START JOURNEY
        </button>

        <button>
            📖 JOURNAL
        </button>

        <button>
            🌸 DAILY BOOST
        </button>

        <button>
            🍃 BREATHE
        </button>

        <button>
            🎵 RELAX
        </button>

        <button>
            ❤️ CRISIS HELP
        </button>

    </nav>

</div>

<!-- Sparkles -->

<div id="particles"></div>

<script src="script.js"></script>

</body>
</html>
