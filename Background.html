<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodz Lounge 2600</title>
  <link rel="stylesheet" href="css/background.css" />
</head>
<body>

  <main class="scene">
    <div class="stars"></div>
    <div class="stars stars-2"></div>

    <div class="moon"></div>

    <div class="hud">
      <h1>日本 2600</h1>
      <p>MOODZ LOUNGE</p>
      <div class="bar"><span></span></div>
      <p class="tiny">FIND YOUR PEACE</p>
    </div>

    <div class="ship ship-big"></div>
    <div class="ship ship-small"></div>

    <section class="city">
      <div class="building pagoda">
        <div class="roof"></div>
        <div class="roof r2"></div>
        <div class="roof r3"></div>
      </div>

      <div class="building tall sign-a">未来</div>
      <div class="building tower"></div>
      <div class="building wide"></div>
      <div class="building neon-sign">2600</div>
      <div class="building skinny"></div>
      <div class="building lounge">MOODZ</div>
      <div class="building tall sign-b">平和</div>
      <div class="building mega"></div>
    </section>

    <div class="water"></div>

    <div class="cherry-tree"></div>

    <div class="deck">
      <div class="rail"></div>
      <div class="person"></div>
      <div class="lantern"></div>
    </div>
  </main>

</body>
</html>
